name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate local.properties for Gradle
        run: |
          echo "flutter.sdk=$FLUTTER_HOME" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Accept Android SDK licenses & Install NDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;27.0.12077973" 2>&1 || echo "NDK install attempted"

      - name: Build APK (release)
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: arabtweets-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Arabtweets v1.0.${{ github.run_number }}
          body: |
            ## Arabtweets - تطبيق عرب تويتز 🐦

            تطبيق تواصل اجتماعي عربي احترافي مبني بـ Flutter و Supabase

            ### المميزات:
            - واجهة عربية احترافية (RTL)
            - منشورات مع وسائط متعددة
            - نظام رسائل فورية
            - تسجيل صوتي
            - شاشة الريلز
            - بحث وهاشتاقات رائجة
            - إشعارات فورية
            - لوحة تحكم للمسؤول
            - وضع داكن/فاتح
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
